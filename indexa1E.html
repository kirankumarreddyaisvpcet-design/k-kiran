    <title>Three Types of Functions</title>
</head>
<body>

    <h2>JavaScript Function Types</h2>

    <button onclick="greet()">Call Function Declaration</button>
    <button onclick="sayGoodbye()">Call Function Expression</button>
    <button onclick="showThanks()">Call Arrow Function</button>

    <p id="output"></p>
</body>
</html>
