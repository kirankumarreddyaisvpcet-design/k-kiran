<!DOCTYPE html>
<html>
<head>
    <title>Button Click Events</title>
</head>
<body>

    <h2>Click a Button:</h2>

    <button id="btn1">Button 1</button>
    <button id="btn2">Button 2</button>
    <button id="btn3">Button 3</button>

    <p id="output">You haven't clicked any button yet.</p>

    <script>
        const btn1 = document.getElementById("btn1");
        const btn2 = document.getElementById("btn2");
        const btn3 = document.getElementById("btn3");
        const output = document.getElementById("output");

        btn1.addEventListener("click", function() {
            output.textContent = "You clicked Button 1!";
            output.style.color = "blue";
        });

        btn2.addEventListener("click", function() {
            output.textContent = "You clicked Button 2!";
            output.style.color = "green";
        });

        btn3.addEventListener("click", function() {
            output.textContent = "You clicked Button 3!";
            output.style.color = "red";
        });
    </script>

</body>
</html>
